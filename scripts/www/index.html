// IMPORT / EXPORT (JSON)
// ===================================================================
function showImportModal() {
  openModal('导入数据', '', [
    { text: '取消', class: 'btn-outline', action: 'closeModal()' },
    { text: '导入', class: 'btn-primary', action: 'performImport()' },
  ]);
  document.getElementById('modalContainer').classList.add('wide');
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label class="form-label">选择 JSON 文件</label>
      <input type="file" class="form-input" id="importFile" accept=".json" style="padding:8px;"></div>
    <div class="form-group"><label class="form-label">或者粘贴 JSON 数据</label>
      <textarea class="form-textarea" id="importText" rows="8" placeholder="粘贴 JSON 数据..."></textarea></div>
    <details style="margin-top:16px;">
      <summary style="cursor:pointer;font-size:14px;font-weight:600;color:var(--primary);">📄 查看 JSON 模板示例</summary>
      <div class="json-template" style="margin-top:8px;">${getJsonTemplate()}</div>
      <button class="btn btn-sm btn-outline" style="margin-top:8px;" onclick="copyTemplate()">📋 复制模板</button>
    </details>`;
}

function getJsonTemplate() {
  return escapeHtml(JSON.stringify({
    categories: [{ name: "中华传统文化类", children: [{ name: "武术", children: [] }] }, { name: "科技发展类", children: [{ name: "人工智能", children: [] }] }],
    vocabulary: [{ word: "Kung Fu", definition: "功夫；中国武术", examples: ["Kung Fu is a traditional Chinese martial art."], note: "也可写作 Gongfu", categories: ["中华传统文化类/武术"] }],
    grammar: [{ title: "虚拟语气", content: "虚拟语气用于表达与事实相反的假设...", categories: ["语法专题"] }],
    material: [{ title: "高级替换词: important", content: "crucial, vital, essential, significant...", categories: ["写作素材"] }]
  }, null, 2));
}

function copyTemplate() {
  const t = JSON.stringify({
    categories: [{ name: "分类名称", children: [{ name: "子分类", children: [] }] }],
    vocabulary: [{ word: "单词", definition: "释义", examples: ["例句"], note: "备注", categories: ["分类路径"] }],
    grammar: [{ title: "标题", content: "内容", categories: ["分类路径"] }],
    material: [{ title: "标题", content: "内容", categories: ["分类路径"] }]
  }, null, 2);
  navigator.clipboard.writeText(t).then(() => showToast('模板已复制', 'success'));
}

async function performImport() {
  let jsonData;
  const fileInput = document.getElementById('importFile');
  const textInput = document.getElementById('importText');
  if (fileInput.files.length > 0) {
    try { jsonData = JSON.parse(await fileInput.files[0].text()); } catch (e) { showToast('文件解析失败: ' + e.message, 'error'); return; }
  } else if (textInput.value.trim()) {
    try { jsonData = JSON.parse(textInput.value.trim()); } catch (e) { showToast('JSON 解析失败: ' + e.message, 'error'); return; }
  } else { showToast('请选择文件或粘贴数据', 'error'); return; }
  try {
    await importData(jsonData);
    await loadAllData();
    renderCategoryTree(); renderContent(); updateStats();
    closeModal();
    showToast('数据导入成功!', 'success');
  } catch (e) { showToast('导入失败: ' + e.message, 'error'); }
}

async function importData(data) {
  const categoryMap = {};
  async function importCatTree(cats, parentId, prefix) {
    if (!Array.isArray(cats)) return;
    for (const c of cats) {
      const path = prefix ? prefix + '/' + c.name : c.name;
      let existing = appState.categories.find(ec => ec.name === c.name && ec.parentId === parentId);
      let catId;
      if (existing) { catId = existing.id; } else {
        catId = generateId();
        await dbPut('categories', { id: catId, name: c.name, parentId, expanded: false, createdAt: Date.now() });
      }
      categoryMap[path] = catId;
      if (c.children?.length) await importCatTree(c.children, catId, path);
    }
  }
  if (data.categories) { await loadAllData(); await importCatTree(data.categories, null, ''); await loadAllData(); }

  function resolveCatPath(path) {
    if (categoryMap[path]) return categoryMap[path];
    const parts = path.split('/');
    let parentId = null;
    for (const part of parts) {
      const found = appState.categories.find(c => c.name === part && c.parentId === parentId);
      if (found) parentId = found.id; else return null;
    }
    return parentId;
  }

  async function importEntries(entries, type) {
    if (!Array.isArray(entries)) return;
    for (const item of entries) {
      let existing = type === 'vocabulary' ? appState.entries.find(e => e.type === type && e.word === item.word) : appState.entries.find(e => e.type === type && e.title === item.title);
      let entryId;
      if (existing) {
        Object.assign(existing, item, { id: existing.id, type, createdAt: existing.createdAt });
        delete existing.categories;
        await dbPut('entries', existing);
        entryId = existing.id;
      } else {
        entryId = generateId();
        const entry = { id: entryId, type, createdAt: Date.now(), ...item };
        delete entry.categories;
        await dbPut('entries', entry);
      }
      if (item.categories && Array.isArray(item.categories)) {
        await loadAllData();
        for (const catPath of item.categories) {
          let catId = resolveCatPath(catPath);
          if (!catId) {
            const parts = catPath.split('/');
            let parentId = null;
            for (const part of parts) {
              let found = appState.categories.find(c => c.name === part && c.parentId === parentId);
              if (!found) { const nid = generateId(); await dbPut('categories', { id: nid, name: part, parentId, expanded: false, createdAt: Date.now() }); await loadAllData(); catId = nid; parentId = nid; }
              else { catId = found.id; parentId = found.id; }
            }
          }
          if (catId) {
            await loadAllData();
            if (!appState.entryCategories.find(ec => ec.entryId === entryId && ec.categoryId === catId))
              await dbPut('entry_categories', { id: generateId(), entryId, categoryId: catId });
          }
        }
      }
    }
  }
  if (data.vocabulary) { await importEntries(data.vocabulary, 'vocabulary'); await loadAllData(); }
  if (data.grammar) { await importEntries(data.grammar, 'grammar'); await loadAllData(); }
  if (data.material) { await importEntries(data.material, 'material'); await loadAllData(); }
}

function showExportModal() {
  openModal('导出数据 (JSON)', '', [
    { text: '取消', class: 'btn-outline', action: 'closeModal()' },
    { text: '导出', class: 'btn-primary', action: 'performExport()' },
  ]);
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group"><label class="form-label">选择导出范围</label>
      <div class="radio-group" style="margin-bottom:16px;">
        <label class="radio-item"><input type="radio" name="exportScope" value="all" checked> 全部数据</label>
        <label class="radio-item"><input type="radio" name="exportScope" value="notebook"> 按笔记本</label>
        <label class="radio-item"><input type="radio" name="exportScope" value="category"> 按分类</label></div></div>
    <div id="exportScopeDetail"></div>`;
  document.querySelectorAll('input[name="exportScope"]').forEach(r => {
    r.addEventListener('change', (e) => {
      const det = document.getElementById('exportScopeDetail');
      if (e.target.value === 'notebook') {
        det.innerHTML = `<div class="checkbox-group"><label class="checkbox-item"><input type="checkbox" value="vocabulary" checked> 📝 生词本</label>
          <label class="checkbox-item"><input type="checkbox" value="grammar" checked> 📐 语法本</label>
          <label class="checkbox-item"><input type="checkbox" value="material" checked> ✨ 素材本</label></div>`;
      } else if (e.target.value === 'category') {
        det.innerHTML = `<div class="category-selector" style="max-height:300px;">${renderCategorySelectorTree(getRootCategories(), true)}</div>`;
      } else { det.innerHTML = ''; }
    });
  });
}

function exportSelected() {
  if (appState.selectedEntries.size === 0) { showToast('请先选择条目', 'error'); return; }
  const entries = appState.entries.filter(e => appState.selectedEntries.has(e.id));
  downloadJson(buildExportData(entries), 'learning-hub-export.json');
  showToast(`已导出 ${entries.length} 个条目`, 'success');
}

function performExport() {
  const scope = document.querySelector('input[name="exportScope"]:checked').value;
  let entries;
  if (scope === 'all') { entries = [...appState.entries]; }
  else if (scope === 'notebook') {
    const types = Array.from(document.querySelectorAll('#exportScopeDetail input:checked')).map(cb => cb.value);
    entries = appState.entries.filter(e => types.includes(e.type));
  } else {
    const catIds = Array.from(document.querySelectorAll('.cat-select-cb:checked')).map(cb => cb.dataset.catId);
    const idSet = new Set();
    catIds.forEach(cid => getCategoryEntries(cid).forEach(e => idSet.add(e.id)));
    entries = appState.entries.filter(e => idSet.has(e.id));
  }
  if (entries.length === 0) { showToast('没有要导出的数据', 'error'); return; }
  downloadJson(buildExportData(entries), 'learning-hub-export.json');
  closeModal();
  showToast(`已导出 ${entries.length} 个条目`, 'success');
}

function buildExportData(entries) {
  function buildCatTree(parentId) {
    return appState.categories.filter(c => c.parentId === parentId).map(c => ({ name: c.name, children: buildCatTree(c.id) }));
  }
  const data = { categories: buildCatTree(null), vocabulary: [], grammar: [], material: [] };
  entries.forEach(e => {
    const catPaths = getEntryCategoryIds(e.id).map(id => getCategoryPath(id));
    const item = { ...e, categories: catPaths };
    delete item.id; delete item.type; delete item.createdAt;
    if (e.type === 'vocabulary') data.vocabulary.push(item);
    else if (e.type === 'grammar') data.grammar.push(item);
    else data.material.push(item);
  });
  return data;
}

function downloadJson(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ===================================================================
// MODAL SYSTEM
// ===================================================================
function openModal(title, bodyHtml, footerButtons) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalContainer').className = 'modal';
  document.getElementById('modalFooter').innerHTML = footerButtons.map(btn =>
    `<button class="btn ${btn.class}" onclick="${btn.action}">${btn.text}</button>`).join('');
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });

// ===================================================================
// CONFIRM DIALOG
// ===================================================================
function showConfirm(title, message, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  appState.confirmCallback = callback;
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); appState.confirmCallback = null; }
async function confirmAction() { if (appState.confirmCallback) await appState.confirmCallback(); closeConfirm(); }

// ===================================================================
// TOAST
// ===================================================================
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${escapeHtml(message)}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.transition = 'opacity 0.3s'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ===================================================================
// UTILITIES
// ===================================================================
function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
function escapeAttr(text) { if (!text) return ''; return text.replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// ===================================================================
// KEYBOARD SHORTCUTS
// ===================================================================
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') { e.preventDefault(); document.getElementById('globalSearch').focus(); }
  if (e.key === 'Escape') { closeModal(); closeConfirm(); document.getElementById('contextMenu').classList.remove('show'); }
});

// ===================================================================
// INIT
// ===================================================================
async function initApp() {
  try {
    await openDB();
    await loadAllData();
    renderCategoryTree(); renderContent(); updateBreadcrumb(); updateStats();
    restoreSidebarState();
    restoreZoom();
    if (appState.entries.length === 0 && appState.categories.length === 0) {
      await addSampleData();
      await loadAllData();
      renderCategoryTree(); renderContent(); updateStats();
    }
  } catch (e) { console.error('Init error:', e); showToast('初始化失败: ' + e.message, 'error'); }
}

function addPdfRecord(name,itemCount,printOnly){S.pdfHistory.push({id:gid(),name,createdAt:Date.now(),size:0,itemCount,printOnly});persistPdfMeta();}
function showPdfHistory(){const records=[...S.pdfHistory].sort((a,b)=>b.createdAt-a.createdAt);openModal('历史PDF记录','',[{text:'关闭',cls:'btn-outline',act:'closeModal()'}]);document.getElementById('modalContainer').classList.add('wide');const b=document.getElementById('modalBody');if(!records.length){b.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><h3>暂无历史记录</h3></div>';return;}b.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;"><div style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="pdfSelectAll" onchange="togglePdfSelectAll(this.checked)"><span style="font-size:13px;">全选</span></div><div style="display:flex;gap:6px;"><button class="btn btn-sm btn-danger" onclick="deleteSelectedPdfs()">🗑️ 删除选中</button><button class="btn btn-sm btn-danger" onclick="clearAllPdfs()">🗑️ 清空全部</button></div></div><div id="pdfRecordList">${records.map(r=>`<div class="pdf-record" data-id="${r.id}"><input type="checkbox" class="pdf-record-cb" data-pdf-id="${r.id}" style="flex-shrink:0;accent-color:var(--primary);"><div class="pdf-info"><div class="pdf-name">📄 ${esc(r.name)}</div><div class="pdf-meta">${new Date(r.createdAt).toLocaleString('zh-CN')} | ${r.itemCount||'?'} 项 | ${r.printOnly?'打印模式':'文件模式'}</div></div><div class="pdf-record-actions"><button class="btn btn-xs btn-danger" onclick="deletePdfRecord('${r.id}')">🗑️</button></div></div>`).join('')}</div>`;}
function togglePdfSelectAll(c){document.querySelectorAll('.pdf-record-cb').forEach(cb=>cb.checked=c);}
function deletePdfRecord(id){showConfirm('删除记录','确定删除此记录？',()=>{S.pdfHistory=S.pdfHistory.filter(r=>r.id!==id);persistPdfMeta();showPdfHistory();showToast('已删除','success');});}
function deleteSelectedPdfs(){const ids=Array.from(document.querySelectorAll('.pdf-record-cb:checked')).map(cb=>cb.dataset.pdfId);if(!ids.length){showToast('请先选择','error');return;}showConfirm('批量删除',`删除 ${ids.length} 条记录？`,()=>{S.pdfHistory=S.pdfHistory.filter(r=>!ids.includes(r.id));persistPdfMeta();showPdfHistory();showToast('已删除','success');});}
function clearAllPdfs(){showConfirm('清空全部','确定删除所有PDF记录？',()=>{S.pdfHistory=[];persistPdfMeta();showPdfHistory();showToast('已清空','success');});}

function showImportModal(){openModal('导入数据','',[{text:'取消',cls:'btn-outline',act:'closeModal()'},{text:'预览导入',cls:'btn-primary',act:'previewImport()'}]);document.getElementById('modalContainer').classList.add('wide');document.getElementById('modalBody').innerHTML=`<div class="form-group"><label class="form-label">选择 JSON 文件</label><input type="file" class="form-input" id="importFile" accept=".json" style="padding:7px;"></div><div class="form-group"><label class="form-label">或粘贴 JSON</label><textarea class="form-textarea" id="importText" rows="6" placeholder="粘贴JSON数据..."></textarea></div><details style="margin-top:12px;"><summary style="cursor:pointer;font-size:13px;font-weight:600;color:var(--primary);">📄 查看JSON模板</summary><div class="json-template" style="margin-top:6px;">${esc(JSON.stringify({categories:[{name:"分类",children:[{name:"子分类",children:[]}]}],vocabulary:[{word:"word",definition:"释义",examples:["例句"],note:"备注",categories:["分类/子分类"]}],grammar:[{title:"标题",content:"内容",categories:["分类"]}],material:[{title:"标题",content:"内容",categories:["分类"]}]},null,2))}</div><button class="btn btn-sm btn-outline" style="margin-top:6px;" onclick="navigator.clipboard.writeText(JSON.stringify({categories:[{name:'分类',children:[]}],vocabulary:[{word:'word',definition:'释义',examples:['例句'],note:'',categories:['分类']}],grammar:[{title:'标题',content:'内容',categories:['分类']}],material:[{title:'标题',content:'内容',categories:['分类']}]},null,2));showToast('已复制','success');">📋 复制模板</button></details>`;}

async function getImportJson(){const fi=document.getElementById('importFile'),ti=document.getElementById('importText');if(fi&&fi.files.length){try{return JSON.parse(await fi.files[0].text());}catch(e){showToast('文件解析失败','error');return null;}}else if(ti&&ti.value.trim()){try{return JSON.parse(ti.value.trim());}catch(e){showToast('JSON解析失败','error');return null;}}showToast('请选择文件或粘贴数据','error');return null;}

async function previewImport(){const data=await getImportJson();if(!data)return;const vocCount=(data.vocabulary||[]).length,gramCount=(data.grammar||[]).length,matCount=(data.material||[]).length;let catCount=0;function cc(cats){if(!Array.isArray(cats))return;cats.forEach(c=>{catCount++;if(c.children)cc(c.children);});}cc(data.categories);openModal('导入预览','',[{text:'取消',cls:'btn-outline',act:'closeModal()'},{text:'确认导入',cls:'btn-success',act:'confirmImport()'}]);document.getElementById('modalBody').innerHTML=`<div class="import-preview"><h4>📊 导入数据概览</h4><div class="preview-stat"><div class="preview-stat-item"><div class="num">${catCount}</div><div class="label">分类</div></div><div class="preview-stat-item"><div class="num">${vocCount}</div><div class="label">生词</div></div><div class="preview-stat-item"><div class="num">${gramCount}</div><div class="label">语法</div></div><div class="preview-stat-item"><div class="num">${matCount}</div><div class="label">素材</div></div></div><p style="font-size:13px;color:var(--text-secondary);margin-top:10px;">⚠️ 以合并方式导入</p></div>`;window._pendingImport=data;}

async function confirmImport(){const data=window._pendingImport;if(!data)return;try{await saveSnapshot('导入数据');importData(data);forceSave();renderAll();closeModal();showToast('导入成功!','success');window._pendingImport=null;}catch(e){showToast('导入失败:'+e.message,'error');}}

function importData(data){const catMap={};function importCatTree(cats,pid,prefix){if(!Array.isArray(cats))return;for(const c of cats){const path=prefix?prefix+'/'+c.name:c.name;let ex=S.categories.find(ec=>ec.name===c.name&&ec.parentId===pid);let cid;if(ex){cid=ex.id;}else{cid=gid();S.categories.push({id:cid,name:c.name,parentId:pid,expanded:false,createdAt:Date.now()});}catMap[path]=cid;if(c.children&&c.children.length)importCatTree(c.children,cid,path);}}if(data.categories)importCatTree(data.categories,null,'');function resolvePath(path){if(catMap[path])return catMap[path];const parts=path.split('/');let pid=null;for(const p of parts){const f=S.categories.find(c=>c.name===p&&c.parentId===pid);if(f)pid=f.id;else return null;}return pid;}function importEntries(items,type){if(!Array.isArray(items))return;for(const item of items){let ex;if(type==='vocabulary')ex=S.entries.find(e=>e.type===type&&e.word===item.word);else ex=S.entries.find(e=>e.type===type&&e.title===item.title);let eid;if(ex){Object.assign(ex,item,{id:ex.id,type,createdAt:ex.createdAt});delete ex.categories;eid=ex.id;}else{eid=gid();const entry={id:eid,type,createdAt:Date.now(),...item};delete entry.categories;S.entries.push(entry);}if(item.categories&&Array.isArray(item.categories)){for(const cp of item.categories){let cid=resolvePath(cp);if(!cid){const parts=cp.split('/');let pid=null;for(const part of parts){let f=S.categories.find(c=>c.name===part&&c.parentId===pid);if(!f){const nid=gid();S.categories.push({id:nid,name:part,parentId:pid,expanded:false,createdAt:Date.now()});cid=nid;pid=nid;}else{cid=f.id;pid=f.id;}}}if(cid&&!S.ecats.find(ec=>ec.entryId===eid&&ec.categoryId===cid))S.ecats.push({id:gid(),entryId:eid,categoryId:cid});}}}}if(data.vocabulary)importEntries(data.vocabulary,'vocabulary');if(data.grammar)importEntries(data.grammar,'grammar');if(data.material)importEntries(data.material,'material');}

function showExportModal(){openModal('导出数据','',[{text:'取消',cls:'btn-outline',act:'closeModal()'},{text:'导出JSON',cls:'btn-primary',act:'performExport()'}]);document.getElementById('modalBody').innerHTML=`<div class="form-group"><label class="form-label">导出范围</label><div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px;"><label style="display:flex;align-items:center;gap:5px;cursor:pointer;"><input type="radio" name="expScope" value="all" checked> 全部</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;"><input type="radio" name="expScope" value="notebook"> 按笔记本</label><label style="display:flex;align-items:center;gap:5px;cursor:pointer;"><input type="radio" name="expScope" value="category"> 按分类</label></div></div><div id="expDetail"></div>`;document.querySelectorAll('input[name="expScope"]').forEach(r=>{r.addEventListener('change',e=>{const d=document.getElementById('expDetail');if(e.target.value==='notebook')d.innerHTML=`<div style="display:flex;flex-wrap:wrap;gap:10px;"><label style="display:flex;align-items:center;gap:5px;"><input type="checkbox" value="vocabulary" checked> 📝 生词</label><label style="display:flex;align-items:center;gap:5px;"><input type="checkbox" value="grammar" checked> 📐 语法</label><label style="display:flex;align-items:center;gap:5px;"><input type="checkbox" value="material" checked> ✨ 素材</label></div>`;else if(e.target.value==='category')d.innerHTML=`<div class="category-selector" style="max-height:250px;">${renderCatSelector(rootCats(),true)}</div>`;else d.innerHTML='';});});}
function exportSelectedEntries(){if(!S.selEntries.size){showToast('请先选择','error');return;}downloadJson(buildExportData(S.entries.filter(e=>S.selEntries.has(e.id))),'export.json');showToast('已导出','success');}
function performExport(){const scope=document.querySelector('input[name="expScope"]:checked').value;let entries;if(scope==='all')entries=[...S.entries];else if(scope==='notebook'){const types=Array.from(document.querySelectorAll('#expDetail input:checked')).map(cb=>cb.value);entries=S.entries.filter(e=>types.includes(e.type));}else{const cids=Array.from(document.querySelectorAll('.cat-sel-cb:checked')).map(cb=>cb.dataset.catId);const eids=new Set();cids.forEach(cid=>catEntries(cid).forEach(e=>eids.add(e.id)));entries=S.entries.filter(e=>eids.has(e.id));}if(!entries.length){showToast('无数据','error');return;}downloadJson(buildExportData(entries),'export.json');closeModal();showToast(`已导出 ${entries.length} 条`,'success');}
function buildExportData(entries){function buildTree(pid){return S.categories.filter(c=>c.parentId===pid).map(c=>({name:c.name,children:buildTree(c.id)}));}const d={categories:buildTree(null),vocabulary:[],grammar:[],material:[]};entries.forEach(e=>{const cp=entryCatIds(e.id).map(id=>catPath(id));const item={...e,categories:cp};delete item.id;delete item.type;delete item.createdAt;if(e.type==='vocabulary')d.vocabulary.push(item);else if(e.type==='grammar')d.grammar.push(item);else d.material.push(item);});return d;}
function downloadJson(data,name){downloadBlob(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),name);}

// =====================================================================
// 19) MODAL / CONFIRM / TOAST
// =====================================================================
function openModal(title,bodyHtml,footerBtns){document.getElementById('modalContainer').className='modal';document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=bodyHtml;document.getElementById('modalFooter').innerHTML=footerBtns.map(b=>`<button class="btn ${b.cls}" onclick="${b.act}">${b.text}</button>`).join('');document.getElementById('modalOverlay').classList.add('active');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
function showConfirm(title,msg,cb){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMessage').textContent=msg;S.confirmCb=cb;document.getElementById('confirmOverlay').classList.add('active');}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('active');S.confirmCb=null;}
async function confirmAction(){if(S.confirmCb)await S.confirmCb();closeConfirm();}
function showToast(msg,type='info'){const c=document.getElementById('toastContainer');const icons={success:'✅',error:'❌',info:'ℹ️'};const t=document.createElement('div');t.className=`toast ${type}`;t.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;c.appendChild(t);setTimeout(()=>{t.style.transition='opacity 0.3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},3000);}

// =====================================================================
// 20) UTILS
// =====================================================================
function esc(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function escA(t){return(t||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escRx(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

// =====================================================================
// 21) KEYBOARD / EVENTS
// =====================================================================
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();document.getElementById('globalSearch').focus();}if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();if(S.undoSnapshot)requestUndo();}if(e.key==='Escape'){closeModal();closeConfirm();document.getElementById('contextMenu').classList.remove('show');}});
window.addEventListener('resize',()=>{if(!isMobile()&&!S.sidebarOpen){S.sidebarOpen=true;document.getElementById('sidebar').classList.remove('collapsed');document.getElementById('sidebarOverlay').classList.remove('show');}});
window.addEventListener('beforeunload',()=>forceSave());
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')forceSave();});
setInterval(()=>{if(S.entries.length||S.categories.length)forceSave();},15000);

// =====================================================================
// 22) SAMPLE DATA
// =====================================================================
function addSampleData(){
  const c1=gid(),c2=gid(),c3=gid(),c4=gid(),c5=gid();
  S.categories.push({id:c1,name:'中华传统文化类',parentId:null,expanded:true,createdAt:Date.now()},{id:c2,name:'武术',parentId:c1,expanded:false,createdAt:Date.now()},{id:c3,name:'科技发展类',parentId:null,expanded:true,createdAt:Date.now()},{id:c4,name:'人工智能',parentId:c3,expanded:false,createdAt:Date.now()},{id:c5,name:'体育运动类',parentId:null,expanded:false,createdAt:Date.now()});
  const e1=gid();S.entries.push({id:e1,type:'vocabulary',word:'Kung Fu',definition:'功夫；中国武术',examples:['Kung Fu is a traditional Chinese martial art.','He has practiced Kung Fu for ten years.'],note:'也可写作 Gongfu',createdAt:Date.now()});S.ecats.push({id:gid(),entryId:e1,categoryId:c2},{id:gid(),entryId:e1,categoryId:c5});
  const e2=gid();S.entries.push({id:e2,type:'vocabulary',word:'Algorithm',definition:'算法',examples:['Machine learning algorithms identify patterns.'],note:'',createdAt:Date.now()});S.ecats.push({id:gid(),entryId:e2,categoryId:c4});
  const e3=gid();S.entries.push({id:e3,type:'vocabulary',word:'Artificial Intelligence',definition:'人工智能',examples:['AI is transforming every industry.'],note:'缩写: AI',createdAt:Date.now()});S.ecats.push({id:gid(),entryId:e3,categoryId:c4});
  const e4=gid();S.entries.push({id:e4,type:'vocabulary',word:'Calligraphy',definition:'书法',examples:['Chinese calligraphy is a form of art.'],note:'',createdAt:Date.now()});S.ecats.push({id:gid(),entryId:e4,categoryId:c1});
  const e5=gid();S.entries.push({id:e5,type:'grammar',title:'虚拟语气 (Subjunctive Mood)',content:'虚拟语气用于表达假设、愿望、建议等。\n\n1. 与现在相反: If I were you, I would study harder.\n2. 与过去相反: If I had studied harder, I would have passed.\n3. 与将来相反: If I should win, I would travel.\n\n注意事项：\n- 在虚拟语气中，be动词统一用were\n- wish后面的从句用过去时表示现在的愿望\n- It is important that he (should) be here on time.\n\n更多例句：\n- If I had wings, I would fly to you.\n- I wish I knew the answer.\n- He suggested that we go together.\n- It is essential that every student attend the meeting.',createdAt:Date.now()});S.ecats.push({id:gid(),entryId:e5,categoryId:c3});
  const e6=gid();S.entries.push({id:e6,type:'material',title:'Important 的高级替换词',content:'crucial - 至关重要的\nvital - 极其重要的\nessential - 必不可少的\nsignificant - 有重大意义的\nparamount - 最重要的\nindispensable - 不可或缺的\nfundamental - 根本的、基础的\npivotal - 关键性的\ncritical - 批判性的、关键的\nimperative - 紧迫的、必要的\n\n使用示例：\n1. It is crucial that we address climate change immediately.\n2. Education plays a vital role in personal development.\n3. Water is essential for all living organisms.\n4. This discovery is of paramount importance to the scientific community.',createdAt:Date.now()});S.ecats.push({id:gid(),entryId:e6,categoryId:c3});
}

// =====================================================================
// 23) INIT — FAST, NON-BLOCKING
// =====================================================================
async function initApp(){
  const t0=performance.now();

  // STEP 1: Immediately init sidebar layout (no data needed)
  initSidebar();

  // STEP 2: Try Tauri FS with a strict 800ms total timeout
  // If it takes longer, we just use localStorage and start instantly
  splashMsg('正在连接存储...');
  try{
    const hasTauri=await withTimeout(initTauriFS(),800);
    if(hasTauri){storageMode='tauri';}else{storageMode='localstorage';}
  }catch(e){
    storageMode='localstorage';
  }

  // STEP 3: Load data (localStorage is instant, TauriFS has 1s timeout per file)
  splashMsg('正在加载数据...');
  try{
    const data=await withTimeout(Store.load(DATA_FILE),1500);
    if(data){S.categories=data.categories||[];S.entries=data.entries||[];S.ecats=data.ecats||[];}
  }catch(e){
    // Try pure localStorage fallback
    try{const r=localStorage.getItem('llh_'+DATA_FILE);if(r){const d=JSON.parse(r);S.categories=d.categories||[];S.entries=d.entries||[];S.ecats=d.ecats||[];}}catch(e2){}
  }

  try{
    const pm=await withTimeout(Store.load(PDF_META_FILE),500);
    S.pdfHistory=Array.isArray(pm)?pm:[];
  }catch(e){S.pdfHistory=[];}

  // STEP 4: If empty, add sample data
  if(!S.entries.length&&!S.categories.length){addSampleData();forceSave();}

  // STEP 5: Render UI
  splashMsg('正在渲染界面...');
  renderAll();
  updateSI('saved');

  // STEP 6: Hide splash with animation
  const elapsed=performance.now()-t0;
  const minShow=Math.max(0,300-elapsed); // Show splash at least 300ms to avoid flash
  setTimeout(()=>{document.getElementById('splashScreen').classList.add('hidden');},minShow);

  console.log(`[LLH] Ready in ${Math.round(performance.now()-t0)}ms | Storage: ${storageMode} | ${S.entries.length} entries`);
}

// Start immediately
initApp();
</script>
